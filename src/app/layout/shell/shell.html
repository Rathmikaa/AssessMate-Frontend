<app-ambient-background variant="subtle" />

<ng-template #navContent>
  <div class="flex items-center gap-2.5 px-1 mb-8">
    <svg width="26" height="26" viewBox="0 0 600 600" fill="none">
      <circle cx="300" cy="300" r="260" stroke="var(--color-signal)" stroke-width="16" stroke-dasharray="1563.6 70" stroke-linecap="round" />
    </svg>
    <span class="font-display text-base font-semibold tracking-tight">AssessMate</span>
  </div>

  <nav class="flex-1 space-y-1">
    @for (item of navItems(); track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bg-signal/12 text-signal"
        [routerLinkActiveOptions]="{ exact: false }"
        (click)="closeMobileNav()"
        class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium text-frost/65 hover:text-frost hover:bg-frost/5 transition"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="shrink-0">
          @switch (item.icon) {
            @case ('grid') {
              <rect x="3" y="3" width="7" height="7" rx="1.5" />
              <rect x="14" y="3" width="7" height="7" rx="1.5" />
              <rect x="3" y="14" width="7" height="7" rx="1.5" />
              <rect x="14" y="14" width="7" height="7" rx="1.5" />
            }
            @case ('doc') {
              <path d="M6 2h8l4 4v16H6z" />
              <path d="M14 2v4h4" />
              <line x1="9" y1="13" x2="15" y2="13" />
              <line x1="9" y1="17" x2="15" y2="17" />
            }
            @case ('help') {
              <circle cx="12" cy="12" r="9" />
              <path d="M9.5 9.5a2.5 2.5 0 1 1 3.4 2.3c-.7.4-1.1.9-1.1 1.9" />
              <line x1="12" y1="16.8" x2="12" y2="16.9" />
            }
            @case ('chart') {
              <line x1="4" y1="20" x2="4" y2="13" />
              <line x1="10" y1="20" x2="10" y2="5" />
              <line x1="16" y1="20" x2="16" y2="11" />
              <line x1="20" y1="20" x2="20" y2="8" />
            }
            @case ('send') {
              <path d="M22 2 11 13" />
              <path d="M22 2 15 22l-4-9-9-4 20-7z" />
            }
            @case ('users') {
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            }
          }
        </svg>
        {{ item.label }}
      </a>
    }
  </nav>

  <div class="border-t border-frost/10 pt-4 mt-4 flex items-center gap-3">
    <div class="h-9 w-9 rounded-full bg-signal/15 text-signal flex items-center justify-center text-xs font-semibold shrink-0">
      {{ initials() }}
    </div>
    <div class="min-w-0 flex-1">
      <p class="text-sm font-medium truncate">{{ user()?.fullName }}</p>
      <p class="text-xs text-frost/45">{{ user()?.role }}</p>
    </div>
    <app-theme-toggle />
    <button
      type="button"
      (click)="logout()"
      title="Log out"
      class="text-frost/45 hover:text-flag transition shrink-0"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
    </button>
  </div>
</ng-template>

<div class="relative min-h-screen lg:flex">
  <!-- Desktop sidebar -->
  <aside class="hidden lg:flex lg:flex-col lg:w-64 lg:shrink-0 glass-panel rounded-3xl p-5 m-4 mr-0">
    <ng-container [ngTemplateOutlet]="navContent" />
  </aside>

  <!-- Mobile topbar -->
  <header class="lg:hidden glass-panel sticky top-3 z-30 flex items-center justify-between px-4 py-3 mx-3 mt-3 rounded-2xl">
    <div class="flex items-center gap-2">
      <svg width="22" height="22" viewBox="0 0 600 600" fill="none">
        <circle cx="300" cy="300" r="260" stroke="var(--color-signal)" stroke-width="18" stroke-dasharray="1563.6 70" stroke-linecap="round" />
      </svg>
      <span class="font-display text-sm font-semibold tracking-tight">AssessMate</span>
    </div>
    <button type="button" (click)="toggleMobileNav()" class="text-frost/70 p-1">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <line x1="4" y1="7" x2="20" y2="7" />
        <line x1="4" y1="12" x2="20" y2="12" />
        <line x1="4" y1="17" x2="20" y2="17" />
      </svg>
    </button>
  </header>

  <!-- Mobile drawer -->
  @if (mobileNavOpen()) {
    <div class="lg:hidden fixed inset-0 z-40 bg-coal/70" (click)="closeMobileNav()">
      <aside class="glass-panel absolute left-3 top-3 bottom-3 w-64 rounded-3xl p-5 flex flex-col" (click)="$event.stopPropagation()">
        <ng-container [ngTemplateOutlet]="navContent" />
      </aside>
    </div>
  }

  <!-- Main content -->
  <div class="flex-1 min-w-0 p-3 lg:p-6">
    <main class="glass-panel rounded-3xl p-6 sm:p-8 min-h-[calc(100vh-1.5rem)] lg:min-h-[calc(100vh-3rem)]">
      <router-outlet />
    </main>
  </div>
</div>
