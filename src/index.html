<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AssessMate</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    // Runs before Angular bootstraps and before first paint, so the
    // correct theme is already applied — without this, the page would
    // flash dark (the CSS default) for a moment even for a user whose
    // saved preference, or OS preference, is light.
    (function () {
      var stored = localStorage.getItem('assessmate.theme');
      var theme = stored === 'light' || stored === 'dark'
        ? stored
        : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
